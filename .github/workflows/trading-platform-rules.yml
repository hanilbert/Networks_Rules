name: Aggregate Trading Platform Rules

on:
  push:
    branches:
      - main
    paths:
      - "rules/clash/*.yaml"
      - "rules/surge/*.list"
      - "scripts/aggregate_trading_platform.py"
      - ".github/workflows/trading-platform-rules.yml"
  pull_request:
    paths:
      - "rules/clash/*.yaml"
      - "rules/surge/*.list"
      - "scripts/aggregate_trading_platform.py"
      - ".github/workflows/trading-platform-rules.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Aggregate rules
        run: python scripts/aggregate_trading_platform.py

      - name: Check formatting
        run: git diff --check

      - name: Verify pull request output
        if: github.event_name == 'pull_request'
        run: git diff --exit-code -- rules/clash/trading_platform.yaml rules/surge/trading_platform.list

      - name: Commit aggregated rules
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if ! git diff --quiet -- rules/clash/trading_platform.yaml rules/surge/trading_platform.list; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add rules/clash/trading_platform.yaml rules/surge/trading_platform.list
            git commit -m "chore: aggregate trading platform rules"
            git push
          fi
